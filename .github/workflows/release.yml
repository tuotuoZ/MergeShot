name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            ffmpeg_target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            ffmpeg_target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            ffmpeg_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.target }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── System deps (Linux only, not used here but kept for reference) ────
      # - name: Install Linux deps
      #   if: matrix.platform == 'ubuntu-latest'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev ...

      # ── Download ffmpeg binaries ───────────────────────────────────────────
      - name: Download ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/bin
          TARGET="${{ matrix.ffmpeg_target }}"

          # Download ffmpeg
          curl -L -o /tmp/ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip"
          unzip -q -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_out
          cp /tmp/ffmpeg_out/ffmpeg "src-tauri/bin/ffmpeg-${TARGET}"
          chmod +x "src-tauri/bin/ffmpeg-${TARGET}"

          # Download ffprobe
          curl -L -o /tmp/ffprobe.zip "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip"
          unzip -q -o /tmp/ffprobe.zip -d /tmp/ffprobe_out
          cp /tmp/ffprobe_out/ffprobe "src-tauri/bin/ffprobe-${TARGET}"
          chmod +x "src-tauri/bin/ffprobe-${TARGET}"

          echo "ffmpeg binaries:"
          ls -lh src-tauri/bin/

      - name: Download ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dest = "src-tauri\bin"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null

          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip"
          $zip = "$env:TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\ffmpeg_out" -Force

          $binDir = Get-ChildItem -Path "$env:TEMP\ffmpeg_out" -Recurse -Directory -Filter "bin" | Select-Object -First 1
          Copy-Item (Join-Path $binDir.FullName "ffmpeg.exe")  "$dest\ffmpeg-x86_64-pc-windows-msvc.exe"
          Copy-Item (Join-Path $binDir.FullName "ffprobe.exe") "$dest\ffprobe-x86_64-pc-windows-msvc.exe"

          Write-Host "ffmpeg binaries:"
          Get-ChildItem $dest

      # ── Install npm deps ───────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── Build Tauri app ────────────────────────────────────────────────────
      - name: Build Tauri app (macOS)
        if: runner.os == 'macOS'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional — set these secrets for production builds):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MergeShot ${{ github.ref_name }}'
          releaseBody: |
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MergeShot ${{ github.ref_name }}'
          releaseBody: |
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
